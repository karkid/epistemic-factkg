[pytest]
testpaths = tests
python_files = test_*.py *_test.py
python_classes = Test*
python_functions = test_*

# Minimum test coverage percentage
addopts = --strict-markers --strict-config --verbose -ra

# Test markers for categorizing tests
markers =
    unit: Unit tests for individual components
    integration: Integration tests for component interactions
    slow: Tests that take longer to run
    ai2thor: Tests requiring AI2THOR environment
    visualization: Tests for visualization components
    semantic: Tests for semantic processing

# Minimum Python version
minversion = 6.0

# Logging configuration for tests  
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)8s] %(name)s: %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

# Warnings configuration
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
    ignore::UserWarning:rdflib.*