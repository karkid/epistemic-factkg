# Epistemic FactKG — pipeline configuration
#
# Shared sections (read by all converters):
#   epistemic:   confidence weights per evidence type (v3.0)
#
# Dataset-specific sections:
#   ai2thor:     simulator controller, KG policy, scene list, generation params
#   synthetic:   LLM generator config (model, n_records, distribution)

# ── Shared: epistemic weights ─────────────────────────────────────────────────
# Used by combine_evidence_weights() to compute EW_i in EC formula (ADR-010).
# These are per-evidence-type weights; assignment is now per-evidence (v3.0).
epistemic:
  confidence_weights:
    perception:             0.95   # Simulator ground truth — exact
    testimony:              0.80   # Web sources — reliable but noisy
    non_apprehension:       0.75   # Absence reasoning — closed world only
    comparison_analogy:     0.65   # Analogical/statistical reasoning
    inference:              0.55   # Multi-step synthesis — compounds error
    postulation_derivation: 0.40   # Hypothetical — least reliable

# ── Synthetic generation ──────────────────────────────────────────────────────
synthetic:
  # Anthropic model to use for generation. Haiku is recommended for cost.
  model: "claude-haiku-4-5-20251001"

  # Total records to generate per run.
  n_records: 1000

  # Minimum fraction of records that must be shortcut-breaking (ADR-013).
  min_shortcut_fraction: 0.35

  # Distribution across template types (must sum to 1.0).
  # Shortcut-breaking (SB) types: low_trust_nee, low_trust_refuted_nee, conflicting,
  #   strong_support_weak_refute, weak_support_strong_refute, weak_vs_weak_nee, inference_nee
  # Total SB fraction: ~61% — well above the 35% minimum (ADR-013).
  distribution:
    high_trust_supported:          0.06
    low_trust_nee:                 0.07   # SB: supports→NEE
    high_trust_refuted:            0.06
    low_trust_refuted_nee:         0.07   # SB: refutes→NEE
    conflicting:                   0.07   # SB: both stances, conflicting
    strong_support_weak_refute:    0.09   # SB: has refute stance but verdict=supported
    weak_support_strong_refute:    0.09   # SB: has support stance but verdict=refuted
    weak_vs_weak_nee:              0.09   # SB: both stances present, verdict=NEE
    corroborating_3:               0.06
    perception_direct:             0.07
    inference_nee:                 0.07   # SB: supports→NEE via inference IS penalty
    comparison_supported:          0.06
    non_apprehension_absent:       0.03   # absent→supported (normal)
    non_apprehension_refuted:      0.04   # absence refutes positive claim
    non_apprehension_weak_nee:     0.07   # SB: absent→NEE via low-trust source

  # Output directory for generated JSONL files.
  output_dir: "data/raw/synthetic"

# ── AI2THOR-specific ──────────────────────────────────────────────────────────
ai2thor:
  controller:
    width: 600
    height: 600
    fieldOfView: 90
    # you can add more ai2thor Controller kwargs here

  knowledge_graph_policy:
    include_position: false
    include_rotation: false

    include_isOpen: true
    include_isToggled: true
    include_isMoving: false
    include_isPickedUp: false
    include_isFilledWithLiquid: false
    include_isCooked: false
    include_isSliced: false
    include_isBroken: true
    include_isDirty: true
    include_isUsedUp: false

    include_temperature: true
    include_mass: true
    include_salientMaterials: true

  generation:
    # Per-type targets — ADR-012 (revised for 10 scenes).
    # perception: (20+20+20) × 10 = 600 AI2THOR + ~508 AVeriTeC image/video ≈ 1,100 total
    # non_apprehension: 150 × 10 × 0.5 corruption rate = ~750 — minimum viable for GNN
    # Keeping one_hop/conjunction/negation low: perception is already strong from AVeriTeC.
    max_contexts: 10
    n_one_hop: 10          # perception          — 10 × 2 (corruption) × 10 = 200
    n_conjunction: 10      # perception          — 10 × 2 (corruption) × 10 = 200
    n_negation: 10         # perception          — 10 × 2 (corruption) × 10 = 200
    n_absence: 150         # non_apprehension    — 150 × 10 × 0.5 ≈ 750
    add_corruption: true
    # comparison_analogy and inference generators: deferred (ADR-012 future work)

  output:
    claims_filename: claims_all.jsonl

  performance:
    cleanup_between_scenes: true

  scenes:
    # Kitchens (3)
    - "FloorPlan1"
    - "FloorPlan3"
    - "FloorPlan15"

    # Living Rooms (3)
    - "FloorPlan201"
    - "FloorPlan203"
    - "FloorPlan215"

    # Bedrooms (2)
    - "FloorPlan303"
    - "FloorPlan320"

    # Bathrooms (2)
    - "FloorPlan403"
    - "FloorPlan420"
