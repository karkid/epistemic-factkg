<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="utf-8">
    <title>RDF Knowledge Graph Viewer</title>

    <!-- PyVis Head -->
    {{ head }}

    <!-- Custom Styles -->
    <link rel="stylesheet" href="static/style.css?v={{ cache_buster }}">
    <link rel="stylesheet" href="static/dark.css?v={{ cache_buster }}">


</head>


<body class="dark-mode">


<!-- ================= Header ================= -->

<header id="header">

    <div class="title">
        RDF Knowledge Graph Explorer
    </div>

    <div class="controls">

        <button id="themeBtn">🌙</button>

        <input
            type="text"
            id="searchBox"
            placeholder="Search node..."
        >

        <button id="searchBtn">Search</button>

    </div>

</header>


<!-- ================= Main Layout ================= -->

<div id="layout">


    <!-- Sidebar -->
    <aside id="sidebar">
        <div class="sidebar-content">
            <h3>Graph Controls</h3>
            
            <div class="control-group">
                <h4>Scene Filter</h4>
                <label><input type="checkbox" id="showScenes" checked> Show Scenes</label>
            </div>
        </div>
    </aside>


    <!-- Graph Area -->
    <main id="graph-area">

        {{ body }}

    </main>


</div>

<!-- =============== Floating Toolbar ==================== -->
<div id="floatingToolbar" class="floating-toolbar">

    <button id="zoomInBtn" title="Zoom In">
        ➕
    </button>

    <button id="zoomOutBtn" title="Zoom Out">
        ➖
    </button>

    <button id="homeBtn" title="Home / Fit View">
        🏠
    </button>

    <button id="centerBtn" title="Center Graph">
        🎯
    </button>

</div>


<!-- ================= Footer ================= -->

<footer id="footer">

    <div id="status">
        Ready
    </div>
    
    <div class="footer-stats">
        <span id="nodeCount">Nodes: 0</span>
        <span class="separator">|</span>
        <span id="edgeCount">Edges: 0</span>
    </div>

</footer>


<!-- ================= Scripts ================= -->

<script src="static/script.js?v={{ cache_buster }}"></script>
<script>
  window.network = network;
</script>


</body>

</html>
