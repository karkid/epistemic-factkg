# AI2-THOR Knowledge Graph Generation Configuration

# AI2-THOR Controller Settings
controller:
  width: 600
  height: 600
  fieldOfView: 90
    

# Knowledge Graph Generation Policies
knowledge_graph_policy:
  include_position: false
  include_rotation: false

# Scene and Environment Configuration
scenes:
  - scene_id: "Scene_001"
    environment_ref: "MyHouse"

environment:
  layouts:
    MyHouse:
      living_room:
        id: "FloorPlan203"
        type: "LivingRoom"
        superclass: "Room"
      kitchen:
        id: "FloorPlan3"
        type: "Kitchen"
        superclass: "Room"
      bedroom:
        id: "FloorPlan303"
        type: "Bedroom"
        superclass: "Room"
      bathroom:
        id: "FloorPlan403"
        type: "Bathroom"
        superclass: "Room"

